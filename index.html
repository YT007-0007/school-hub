<!DOCTYPE html>
<html>
<head>
    <title>SchoolHub</title>
</head>
<body>

    <h1>Welcome to SchoolHub</h1>

    <script type="module">
        // 1. Import the necessary tools from Google
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // 2. Your project's unique "ID Card"
        const firebaseConfig = {
            apiKey: "AIzaSyB39QAyq-fQj4QMpIFEhnnhkYpaVzNgHB8",
            authDomain: "schoolhub-72ad9.firebaseapp.com",
            projectId: "schoolhub-72ad9",
            storageBucket: "schoolhub-72ad9.firebasestorage.app",
            messagingSenderId: "328444642318",
            appId: "1:328444642318:web:b7371e557f55407a9f685f"
        };

        // 3. Connect to Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        console.log("SchoolHub is connected to the database!");

        // 4. Function to save a student (you can run this whenever you want)
        async function saveMyFirstStudent() {
            try {
                const docRef = await addDoc(collection(db, "students"), {
                    name: "John Doe",
                    grade: "10th"
                });
                console.log("Student saved with ID: ", docRef.id);
            } catch (e) {
                console.error("Error adding student: ", e);
            }
        }

        // Run the function
        saveMyFirstStudent();
    </script>

</body>
</html>
