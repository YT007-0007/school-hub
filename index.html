<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Hub</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .view { display: none; padding: 20px; border: 2px solid #333; margin-top: 20px; }
        /* Style the scanner area to look professional */
        #scanner-view { display: block; border: 4px dashed #555; padding: 50px; margin-bottom: 20px; }
        .login-box { margin-top: 50px; padding: 10px; border-top: 1px solid #ccc; }
    </style>
</head>
<body>

    <div id="scanner-view">
        <h1>Welcome to School Hub</h1>
        <p>Please scan your ID card to continue.</p>
        <input type="text" id="scannerInput" placeholder="Scanner Input">
        <button onclick="checkScan()">Submit</button>
    </div>

    <div id="view-admin" class="view"><h1>Admin Dashboard</h1></div>
    <div id="view-teacher" class="view"><h1>Teacher Portal</h1></div>
    <div id="view-parent" class="view"><h1>Parent/Student Portal</h1></div>

    <div class="login-box">
        <h3>Admin/Teacher Access</h3>
        <input type="password" id="passInput" placeholder="Enter Password">
        <button onclick="checkPassword()">Login</button>
    </div>

    <script>
        // 1. PASSWORD SETTINGS
        const ADMIN_PASS = "1234"; // You can change this password here

        // 2. SCANNER LOGIC
        function checkScan() {
            const data = document.getElementById('scannerInput').value;
            // Expected format: "Role:ID" (e.g., S:001)
            const [role, id] = data.split(':');
            renderView(role);
        }

        // 3. PASSWORD LOGIC
        function checkPassword() {
            const pass = document.getElementById('passInput').value;
            if (pass === ADMIN_PASS) {
                renderView('A'); // Logs in as Admin
            } else {
                alert("Incorrect Password");
            }
        }

        // 4. VIEW CONTROLLER
        function renderView(role) {
            document.getElementById('scanner-view').style.display = 'none'; // Hide scanner
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            
            if (role === 'A') document.getElementById('view-admin').style.display = 'block';
            if (role === 'T') document.getElementById('view-teacher').style.display = 'block';
            if (role === 'S') document.getElementById('view-parent').style.display = 'block';
        }
    </script>
</body>
</html>
