<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Hub</title>
    
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        #camera-view { width: 100%; max-width: 500px; height: 300px; background: #ddd; border: 2px dashed #555; margin: 20px auto; overflow: hidden; }
        .dashboard-btn { padding: 12px 24px; margin: 10px; cursor: pointer; font-size: 16px; }
        #error-log { color: red; font-weight: bold; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB39QAyq-fQj4QMpIFEhnnhkYpaVzNgHB8",
            authDomain: "schoolhub-72ad9.firebaseapp.com",
            projectId: "schoolhub-72ad9",
            storageBucket: "schoolhub-72ad9.firebasestorage.app",
            messagingSenderId: "328444642318",
            appId: "1:328444642318:web:b7371e557f55407a9f685f"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
    </script>
</head>
<body>

    <div id="scanner-container">
        <h1>School Hub</h1>
        <div id="camera-view"></div>
        <div id="error-log"></div>
        <br>
        <button onclick="adminLogin()">Admin Access</button>
    </div>

    <div id="dashboard-content"></div>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        const ADMIN_PASSWORD = "1432";

        function startScanner() {
            const errorElement = document.getElementById('error-log');
            const html5QrCode = new Html5Qrcode("camera-view");
            
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: 250 },
                (decodedText) => {
                    document.getElementById('dashboard-content').innerHTML = `<h3>Scanned: ${decodedText}</h3>`;
                    html5QrCode.stop();
                },
                (err) => {
                    // Silent logging for scanning errors
                }
            ).catch(err => {
                errorElement.innerHTML = "Camera error: " + err;
            });
        }

        function adminLogin() {
            const userInput = prompt("Enter Admin Code:");
            if (userInput === ADMIN_PASSWORD) {
                document.getElementById('dashboard-content').innerHTML = `
                    <h2>Admin Master Dashboard</h2>
                    <button class="dashboard-btn">Manage Teachers</button>
                    <button class="dashboard-btn">View Attendance</button>
                `;
            } else {
                alert("Access Denied.");
            }
        }

        // Force wait for full page load before starting
        window.addEventListener('load', () => {
            setTimeout(startScanner, 1000);
        });
    </script>
</body>
</html>
