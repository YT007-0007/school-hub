<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Hub</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .nav-btn { padding: 12px 18px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; background: #333; color: white; }
        #camera-view { width: 100%; max-width: 400px; height: 250px; background: #eee; border: 2px dashed #555; margin: 20px auto; }
        .hidden { display: none; }
        .dashboard-box { margin-top: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>School Hub</h1>
    <button class="nav-btn" onclick="showPage('scanner')">Scanner</button>
    <button class="nav-btn" onclick="showPage('register')">Register</button>
    <button class="nav-btn" onclick="showPage('admin')">Admin</button>

    <div id="camera-container" class="hidden">
        <div id="camera-view"></div>
        <button onclick="stopScanner()">Stop</button>
        <p id="fallback-msg" class="hidden">Live camera failed? <input type="file" id="qr-input" accept="image/*" capture="environment"></p>
    </div>

    <div id="scanner-page"><div id="scanner-result" class="dashboard-box">Click Scanner to begin.</div></div>
    <div id="register-page" class="hidden"><div id="reg-result" class="dashboard-box">Register new user.</div></div>
    <div id="admin-page" class="hidden"><div id="admin-result" class="dashboard-box">Admin Area.</div></div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        const MASTER_KEY = "ADMIN_SECRET_1432";
        const PASSWORD = "1432";

        // BEAT FEEDBACK: Plays a simple beep sound
        function playSuccessSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, context.currentTime);
            oscillator.connect(context.destination);
            oscillator.start();
            oscillator.stop(context.currentTime + 0.2);
        }

        function showPage(page) {
            stopScanner();
            document.querySelectorAll('div[id$="-page"]').forEach(div => div.classList.add('hidden'));
            document.getElementById(page + '-page').classList.remove('hidden');
            startScanner(page);
        }

        function startScanner(mode) {
            document.getElementById('camera-container').classList.remove('hidden');
            const scanner = new Html5Qrcode("camera-view");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (data) => {
                playSuccessSound(); // Alarm/Beep plays here
                stopScanner();
                handleData(mode, data);
            }).catch(err => {
                document.getElementById('fallback-msg').classList.remove('hidden');
            });
        }

        function stopScanner() {
            document.getElementById('camera-container').classList.add('hidden');
        }

        function handleData(mode, data) {
            if (mode === 'scanner') {
                document.getElementById('scanner-result').innerHTML = `<h3>Scanned: ${data}</h3>`;
            } else if (mode === 'admin') {
                if (data === MASTER_KEY) alert("Access Granted!");
            }
        }
    </script>
</body>
</html>
