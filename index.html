<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Hub</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .view { display: none; padding: 20px; border: 1px solid #ccc; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>School Hub</h1>
    <p>Please scan your ID card or login to continue.</p>

    <div id="view-admin" class="view"><h1>Admin Dashboard</h1></div>
    <div id="view-teacher" class="view"><h1>Teacher Portal</h1></div>
    <div id="view-parent" class="view"><h1>Parent Portal</h1></div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. CONFIGURATION
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. SCANNER ENGINE
        async function scanEngine(scannedData) {
            // Data format expected: "Role:ID" (e.g., "S:123")
            const [role, id] = scannedData.split(':');
            
            if (role === 'S') {
                await db.collection("students").doc(id).update({
                    isPresent: true,
                    lastCheckIn: new Date().toLocaleTimeString()
                });
            }
            renderView(role);
        }

        // 3. VIEW CONTROLLER
        function renderView(role) {
            // Hide all views
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            
            // Show requested view
            if (role === 'A') document.getElementById('view-admin').style.display = 'block';
            if (role === 'T') document.getElementById('view-teacher').style.display = 'block';
            if (role === 'S') document.getElementById('view-parent').style.display = 'block';
        }
    </script>
</body>
</html>
